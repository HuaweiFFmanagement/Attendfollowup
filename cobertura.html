<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobertura por Supervisor – Huawei FF</title>
  <meta name="theme-color" content="#CF0A2C">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #CF0A2C; --red-light: #fff0f2; --red-mid: #fecdd3;
      --green: #1a7f37; --green-light: #eafbee;
      --amber: #b45309; --amber-light: #fef3c7;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-400: #9ca3af; --gray-600: #4b5563; --gray-800: #1f2937;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

    header { background: var(--red); color: white; padding: 0 1rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
    header h1 { font-size: 15px; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-white { background: white; color: var(--red); border: none; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: var(--radius); cursor: pointer; }
    .btn-ghost { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: white; font-size: 12px; padding: 5px 12px; border-radius: var(--radius); cursor: pointer; }
    .btn-ghost:hover { background: rgba(255,255,255,.25); }

    main { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1rem 5rem; }

    /* UPLOAD */
    #upload-view { display: block; }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 700px; margin: 2.5rem auto 0; }
    .upload-card { background: white; border: 2px dashed var(--gray-200); border-radius: var(--radius-lg); padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; }
    .upload-card:hover, .upload-card.drag { border-color: var(--red); background: var(--red-light); }
    .upload-card input { display: none; }
    .upload-icon { width: 48px; height: 48px; background: var(--red-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto .75rem; }
    .upload-icon svg { color: var(--red); }
    .upload-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .upload-card p { font-size: 12px; color: var(--gray-400); }
    .upload-card .tag { display: inline-block; margin-top: .6rem; font-size: 10px; color: var(--gray-400); background: var(--gray-100); padding: 3px 10px; border-radius: 20px; }
    .upload-status { width: 10px; height: 10px; border-radius: 50%; background: var(--gray-200); display: inline-block; margin-right: 6px; }
    .upload-status.ok { background: var(--green); }
    .upload-note { text-align: center; margin-top: 1.5rem; font-size: 12px; color: var(--gray-400); }

    /* DASHBOARD */
    #dash-view { display: none; }
    .meta-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; }
    .meta-bar-left { display: flex; flex-direction: column; gap: 2px; }
    .meta-bar-left strong { font-size: 15px; }
    .meta-bar-left span { font-size: 12px; color: var(--gray-400); }
    .date-filter { font-size: 13px; padding: 6px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: white; color: var(--gray-800); }

    /* GLOBAL STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .stat { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1rem; }
    .stat-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stat-val { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-val.green { color: var(--green); }
    .stat-val.red { color: var(--red); }
    .stat-val.amber { color: var(--amber); }
    .stat-sub { font-size: 11px; color: var(--gray-400); margin-top: 3px; }

    /* SUPERVISOR GRID */
    .spv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .spv-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
    .spv-card:hover { border-color: var(--red); box-shadow: 0 2px 8px rgba(207,10,44,.08); }
    .spv-card.active { border-color: var(--red); background: var(--red-light); }
    .spv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
    .spv-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .spv-badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-green { background: var(--green-light); color: var(--green); }
    .badge-amber { background: var(--amber-light); color: var(--amber); }
    .badge-red { background: var(--red-light); color: var(--red); }
    .spv-bar-wrap { background: var(--gray-100); border-radius: 4px; height: 6px; overflow: hidden; }
    .spv-bar { height: 100%; border-radius: 4px; transition: width .4s; }
    .bar-green { background: var(--green); }
    .bar-amber { background: #f59e0b; }
    .bar-red { background: var(--red); }
    .spv-numbers { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--gray-400); }

    /* DETAIL PANEL */
    #detail-panel { display: none; background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
    .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .detail-title { font-size: 15px; font-weight: 600; }
    .detail-close { background: none; border: none; font-size: 18px; color: var(--gray-400); cursor: pointer; padding: 0 4px; line-height: 1; }
    .detail-close:hover { color: var(--gray-800); }

    /* CHART */
    .chart-container { position: relative; width: 100%; overflow-x: auto; margin-bottom: 1.25rem; }
    .chart-svg { display: block; }

    /* STORE TABLE */
    .store-table-wrap { overflow-x: auto; border: 1px solid var(--gray-200); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .05em; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
    td { padding: 7px 12px; border-bottom: 1px solid var(--gray-100); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    tr.row-full td { }
    tr.row-partial td { }
    tr.row-zero td { background: #fff5f5; }
    .mini-bar { display: flex; align-items: center; gap: 6px; }
    .mini-bar-track { flex: 1; height: 5px; background: var(--gray-100); border-radius: 3px; overflow: hidden; min-width: 60px; }
    .mini-bar-fill { height: 100%; border-radius: 3px; }
    .chip { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
    .chip-account { background: var(--gray-100); color: var(--gray-600); }

    #update-banner { display: none; position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: var(--gray-800); color: white; font-size: 13px; padding: 10px 18px; border-radius: 20px; box-shadow: 0 4px 12px rgba(0,0,0,.2); z-index: 999; gap: 10px; align-items: center; }
    #update-banner button { background: white; color: var(--gray-800); border: none; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px; cursor: pointer; }

    @media (max-width: 600px) {
      .upload-grid { grid-template-columns: 1fr; }
      .spv-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>Cobertura Diaria <span style="opacity:.7;font-weight:400">· Huawei FF</span></h1>
  <div class="header-actions">
    <button class="btn-ghost" id="btn-export" onclick="exportCSV()" style="display:none">↓ Exportar</button>
    <button class="btn-white" id="btn-reset" onclick="resetApp()" style="display:none">Nuevo</button>
  </div>
</header>

<main>
  <!-- ── UPLOAD ── -->
  <div id="upload-view">
    <div class="upload-grid">
      <div class="upload-card" id="drop-swipe" onclick="document.getElementById('swipeInput').click()">
        <div class="upload-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h3><span class="upload-status" id="st-swipe"></span>Asistencia (SwipeCard)</h3>
        <p>SwipeCardDailyRecords.xlsx</p>
        <span class="tag">iRetail export</span>
        <input type="file" id="swipeInput" accept=".xlsx,.xls">
      </div>
      <div class="upload-card" id="drop-cov" onclick="document.getElementById('covInput').click()">
        <div class="upload-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        </div>
        <h3><span class="upload-status" id="st-cov"></span>Cupos aprobados</h3>
        <p>Cobertura_MMDD.xlsx</p>
        <span class="tag">Coverage file</span>
        <input type="file" id="covInput" accept=".xlsx,.xls">
      </div>
    </div>
    <p class="upload-note">Carga ambos archivos para ver el cruce de cobertura</p>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dash-view">
    <div class="meta-bar">
      <div class="meta-bar-left">
        <strong id="meta-date">—</strong>
        <span id="meta-files">—</span>
      </div>
      <select class="date-filter" id="date-filter" onchange="applyDateFilter()">
        <option value="">Mes actual</option>
      </select>
    </div>

    <div class="stats" id="global-stats"></div>

    <!-- DETAIL PANEL (shown on click) -->
    <div id="detail-panel">
      <div class="detail-header">
        <span class="detail-title" id="detail-title">—</span>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="chart-container">
        <svg class="chart-svg" id="chart-svg" height="180"></svg>
      </div>
      <div class="store-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tienda</th>
              <th>Cadena</th>
              <th>Cupos</th>
              <th>Presentes</th>
              <th>Cobertura</th>
            </tr>
          </thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="spv-grid" id="spv-grid"></div>
  </div>
</main>

<div id="update-banner">
  <span>Nueva versión disponible</span>
  <button onclick="location.reload()">Actualizar</button>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────
let swipeData = null, covData = null;
let swipeFileName = '', covFileName = '';
let supervisors = [];
let allCovRows = [];
let activeSpv = null;
let selectedDate = null;

// ── FILE HANDLERS ─────────────────────────────────────────────
function setupDrop(zone, input, type) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) loadFile(f, type); });
  input.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f, type); });
}
setupDrop(document.getElementById('drop-swipe'), document.getElementById('swipeInput'), 'swipe');
setupDrop(document.getElementById('drop-cov'), document.getElementById('covInput'), 'cov');

function loadFile(file, type) {
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (type === 'swipe') { swipeData = raw; swipeFileName = file.name; document.getElementById('st-swipe').className = 'upload-status ok'; }
    else { covData = raw; covFileName = file.name; allCovRows = raw; document.getElementById('st-cov').className = 'upload-status ok'; populateDateFilter(raw); }
    if (swipeData && covData) buildDashboard();
  };
  reader.readAsArrayBuffer(file);
}

// ── DATE FILTER ───────────────────────────────────────────────
function populateDateFilter(rows) {
  const dates = [...new Set(rows.map(r => {
    const d = r['Date'];
    if (!d) return null;
    if (d instanceof Date) return d.toISOString().substring(0,7);
    if (typeof d === 'string') return d.substring(0,7);
    return null;
  }).filter(Boolean))].sort().reverse();

  const sel = document.getElementById('date-filter');
  sel.innerHTML = '';
  dates.forEach((d, i) => {
    const [y, m] = d.split('-');
    const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const label = `${months[parseInt(m)-1]} ${y}`;
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = label;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  });
  selectedDate = dates[0] || null;
}

function applyDateFilter() {
  selectedDate = document.getElementById('date-filter').value || null;
  buildDashboard();
}

// ── PROCESS ───────────────────────────────────────────────────
function excelDateStr(val) {
  if (!val) return '';
  if (val instanceof Date) return val.toISOString().substring(0,10);
  if (typeof val === 'string') return val.substring(0,10);
  if (typeof val === 'number') {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().substring(0,10);
  }
  return '';
}

function buildDashboard() {
  // Filter coverage to selected month
  let covRows = allCovRows;
  if (selectedDate) {
    covRows = allCovRows.filter(r => {
      const d = excelDateStr(r['Date']);
      return d.startsWith(selectedDate);
    });
  }
  if (covRows.length === 0) covRows = allCovRows;

  // Presentes per store from swipe (Promoter + Non-HW only)
  const presentMap = {};
  swipeData.forEach(r => {
    const duty = (r['Duty'] || '').toLowerCase();
    if (duty.includes('supervio') || duty === 'supervisor') return;
    const code = r['Store Code'] || r['Store code'] || '';
    const checkin = r['First Check In'] || r['First Check in'] || '';
    if (!presentMap[code]) presentMap[code] = 0;
    if (checkin !== '') presentMap[code]++;
  });

  // Build supervisors
  const spvMap = {};
  covRows.forEach(r => {
    const spv = r['Name Supervisor'] || 'Sin asignar';
    if (!spvMap[spv]) spvMap[spv] = [];
    spvMap[spv].push(r);
  });

  supervisors = Object.entries(spvMap).map(([name, rows]) => {
    const stores = rows.map(r => {
      const code = r['Store code'] || r['Store Code'] || '';
      const cupos = parseFloat(r['Coverage pmt']) || 0;
      const presentes = presentMap[code] || 0;
      const pct = cupos > 0 ? Math.min(Math.round(presentes / cupos * 100), 100) : 0;
      return { storeCode: code, store: r['Store'] || '', account: r['Account'] || '', cupos, presentes, pct };
    }).sort((a,b) => a.pct - b.pct);

    const totalCupos = stores.reduce((s, x) => s + x.cupos, 0);
    const totalPresentes = stores.reduce((s, x) => s + x.presentes, 0);
    const pct = totalCupos > 0 ? Math.min(Math.round(totalPresentes / totalCupos * 100), 100) : 0;
    return { name, stores, totalCupos, totalPresentes, pct };
  }).sort((a, b) => a.name.localeCompare(b.name));

  // Date label
  const dateLabel = selectedDate ? (() => {
    const [y,m] = selectedDate.split('-');
    const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return `${months[parseInt(m)-1]} ${y}`;
  })() : 'Período actual';

  document.getElementById('meta-date').textContent = dateLabel;
  document.getElementById('meta-files').textContent = `${swipeFileName} · ${covFileName}`;

  // Global stats
  const totalCupos = supervisors.reduce((s,x) => s + x.totalCupos, 0);
  const totalPresentes = supervisors.reduce((s,x) => s + x.totalPresentes, 0);
  const pctGlobal = totalCupos > 0 ? Math.round(totalPresentes/totalCupos*100) : 0;
  const spvAlerta = supervisors.filter(s => s.pct < 70).length;

  document.getElementById('global-stats').innerHTML = `
    <div class="stat"><div class="stat-label">Supervisores</div><div class="stat-val">${supervisors.length}</div><div class="stat-sub">activos</div></div>
    <div class="stat"><div class="stat-label">Cupos totales</div><div class="stat-val">${totalCupos}</div><div class="stat-sub">aprobados</div></div>
    <div class="stat"><div class="stat-label">Presentes</div><div class="stat-val green">${totalPresentes}</div><div class="stat-sub">con check-in</div></div>
    <div class="stat"><div class="stat-label">Cobertura global</div><div class="stat-val ${pctGlobal>=80?'green':pctGlobal>=60?'amber':'red'}">${pctGlobal}%</div><div class="stat-sub">del total</div></div>
    <div class="stat"><div class="stat-label">Supervisores <70%</div><div class="stat-val ${spvAlerta>0?'red':'green'}">${spvAlerta}</div><div class="stat-sub">en alerta</div></div>
  `;

  renderGrid();

  document.getElementById('upload-view').style.display = 'none';
  document.getElementById('dash-view').style.display = 'block';
  document.getElementById('btn-export').style.display = 'block';
  document.getElementById('btn-reset').style.display = 'block';
  if (activeSpv) { activeSpv = null; closeDetail(); }
}

// ── GRID ──────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('spv-grid');
  grid.innerHTML = '';
  supervisors.forEach(spv => {
    const pct = spv.pct;
    const colorClass = pct >= 80 ? 'badge-green bar-green' : pct >= 60 ? 'badge-amber bar-amber' : 'badge-red bar-red';
    const [badgeClass, barClass] = colorClass.split(' ');
    const div = document.createElement('div');
    div.className = 'spv-card';
    div.innerHTML = `
      <div class="spv-header">
        <span class="spv-name">${spv.name}</span>
        <span class="spv-badge ${badgeClass}">${pct}%</span>
      </div>
      <div class="spv-bar-wrap"><div class="spv-bar ${barClass}" style="width:${pct}%"></div></div>
      <div class="spv-numbers">
        <span>${spv.totalPresentes} de ${spv.totalCupos} cupos cubiertos</span>
        <span>${spv.stores.length} tiendas</span>
      </div>
    `;
    div.addEventListener('click', () => openDetail(spv, div));
    grid.appendChild(div);
  });
}

// ── DETAIL ────────────────────────────────────────────────────
function openDetail(spv, cardEl) {
  document.querySelectorAll('.spv-card').forEach(c => c.classList.remove('active'));
  if (activeSpv === spv.name) { closeDetail(); return; }
  activeSpv = spv.name;
  cardEl.classList.add('active');

  document.getElementById('detail-title').textContent = spv.name + ' — Cobertura por tienda';
  drawChart(spv);
  renderStoreTable(spv);

  const panel = document.getElementById('detail-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  activeSpv = null;
  document.getElementById('detail-panel').style.display = 'none';
  document.querySelectorAll('.spv-card').forEach(c => c.classList.remove('active'));
}

// ── CHART ─────────────────────────────────────────────────────
function drawChart(spv) {
  const stores = spv.stores.filter(s => s.cupos > 0);
  const svgEl = document.getElementById('chart-svg');
  const W = Math.max(stores.length * 52, 300);
  const H = 180;
  const padL = 10, padR = 10, padT = 20, padB = 50;
  const chartH = H - padT - padB;

  svgEl.setAttribute('width', W);
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const barW = 34;
  const gap = (W - padL - padR - stores.length * barW) / (stores.length + 1);

  let svgContent = '';
  // 80% reference line
  const y80 = padT + chartH - (80 / 100) * chartH;
  svgContent += `<line x1="${padL}" y1="${y80}" x2="${W - padR}" y2="${y80}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>`;
  svgContent += `<text x="${W - padR - 2}" y="${y80 - 4}" font-size="9" fill="#9ca3af" text-anchor="end">80%</text>`;

  stores.forEach((s, i) => {
    const x = padL + gap + i * (barW + gap);
    const pct = s.pct;
    const barH = (pct / 100) * chartH;
    const y = padT + chartH - barH;
    const color = pct >= 80 ? '#1a7f37' : pct >= 60 ? '#f59e0b' : '#CF0A2C';
    const name = s.store.length > 14 ? s.store.substring(0, 13) + '…' : s.store;

    svgContent += `<rect x="${x}" y="${padT + chartH}" width="${barW}" height="0" fill="${color}" rx="3" opacity="0.85">
      <animate attributeName="height" from="0" to="${barH}" dur="0.4s" fill="freeze" begin="${i * 0.04}s"/>
      <animate attributeName="y" from="${padT + chartH}" to="${y}" dur="0.4s" fill="freeze" begin="${i * 0.04}s"/>
    </rect>`;
    svgContent += `<text x="${x + barW/2}" y="${Math.max(y - 4, padT + 10)}" font-size="10" font-weight="600" fill="${color}" text-anchor="middle">${pct}%</text>`;
    svgContent += `<text x="${x + barW/2}" y="${H - padB + 14}" font-size="9" fill="#6b7280" text-anchor="middle">${name}</text>`;
    svgContent += `<text x="${x + barW/2}" y="${H - padB + 26}" font-size="8" fill="#9ca3af" text-anchor="middle">${s.presentes}/${s.cupos}</text>`;
  });

  svgEl.innerHTML = svgContent;
}

// ── STORE TABLE ───────────────────────────────────────────────
function renderStoreTable(spv) {
  const tbody = document.getElementById('detail-tbody');
  tbody.innerHTML = '';
  spv.stores.forEach(s => {
    const tr = document.createElement('tr');
    if (s.pct === 0 && s.cupos > 0) tr.className = 'row-zero';
    const color = s.pct >= 80 ? '#1a7f37' : s.pct >= 60 ? '#f59e0b' : '#CF0A2C';
    tr.innerHTML = `
      <td style="font-weight:500">${s.store}</td>
      <td><span class="chip chip-account">${s.account}</span></td>
      <td>${s.cupos}</td>
      <td>${s.presentes}</td>
      <td>
        <div class="mini-bar">
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.pct}%;background:${color}"></div></div>
          <span style="font-size:11px;font-weight:600;color:${color};min-width:32px">${s.pct}%</span>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Supervisor','Tienda','Cadena','Cupos','Presentes','Cobertura %']];
  supervisors.forEach(spv => {
    spv.stores.forEach(s => rows.push([spv.name, s.store, s.account, s.cupos, s.presentes, s.pct]));
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'cobertura_diaria.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── RESET ─────────────────────────────────────────────────────
function resetApp() {
  swipeData = null; covData = null; supervisors = []; allCovRows = []; activeSpv = null;
  ['swipeInput','covInput'].forEach(id => document.getElementById(id).value = '');
  ['st-swipe','st-cov'].forEach(id => document.getElementById(id).className = 'upload-status');
  document.getElementById('upload-view').style.display = 'block';
  document.getElementById('dash-view').style.display = 'none';
  document.getElementById('btn-export').style.display = 'none';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('detail-panel').style.display = 'none';
}

// ── SERVICE WORKER ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      reg.installing.addEventListener('statechange', e => {
        if (e.target.state === 'installed' && navigator.serviceWorker.controller)
          document.getElementById('update-banner').style.display = 'flex';
      });
    });
  });
}
</script>
